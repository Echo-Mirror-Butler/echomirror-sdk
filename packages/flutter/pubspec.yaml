name: echomirror_sdk
description: EchoMirror SDK for Flutter — mood intelligence, Stellar payments, and social wellness.
version: 0.1.0
homepage: https://github.com/Echo-Mirror-Butler/echomirror-sdk

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  http: ^1.2.0
  hooks_riverpod: ^2.5.1
  plugin_platform_interface: ^2.1.8
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
