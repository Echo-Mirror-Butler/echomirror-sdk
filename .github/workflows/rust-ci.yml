name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('Cargo.lock') }}
      - run: cargo test --workspace

  wasm-build:
    name: WASM Build (@echomirror/wasm)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('Cargo.lock') }}-wasm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Builds both wasm-pack targets (web + nodejs) via wasm-pack build,
      # with wasm-opt applied per crates/echomirror-wasm/Cargo.toml, then
      # compiles the hand-written TS wrapper.
      - run: npm run build:wasm -w packages/js/wasm
      - run: npm run build -w packages/js/wasm
      - run: npm run size -w packages/js/wasm
      - run: npm run test -w packages/js/wasm
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:browser -w packages/js/wasm
